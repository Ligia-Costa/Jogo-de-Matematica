<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Matemática</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <h1 class="mt-3">Matemáticando</h1>
        <div id="nome-container" class="mb-3">
            <input type="text" id="nome-usuario" class="form-control" placeholder="Digite seu nome">
            <button class="btn btn-success mt-2" onclick="iniciarJogo()">Iniciar Jogo</button>
        </div>
        <div id="container-jogo" class="card p-4 shadow d-none">
            <h4 id="jogador-atual"></h4>
            <p id="pergunta" class="fs-4"></p>
            <input type="number" id="resposta" class="form-control mb-2" placeholder="Digite sua resposta">
            <button class="btn btn-primary" onclick="verificarResposta()">Enviar</button>
            <p id="resultado" class="mt-2"></p>
            <p>Tempo restante: <span id="tempo">30</span> segundos</p>
            <p>Pontuação: <span id="pontuacao">0</span></p>
        </div>
        <div id="ranking-container" class="card p-4 shadow">
            <h2 class="mt-4">Ranking</h2>
            <ul id="ranking" class="list-group"></ul>
            <button class="btn btn-primary mt-3" onclick="salvarRanking()">Salvar Ranking</button>
            <button class="btn btn-warning mt-3" onclick="limparRanking()">Limpar Ranking</button>
            <button class="btn btn-dark mt-3" onclick="novoJogo()">Novo Jogo</button>
        </div>
    </div>
    <script src="script.js"></script>
    <!-- JS do Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
